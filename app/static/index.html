<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeshCore Firmware Builder</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<main>
  <div id="controls">
    <h1>MeshCore Firmware Builder</h1>

    <label>
      <span>Source</span>
      <select id="source-select">
        <option value="official">Official MeshCore</option>
        <option value="mqtt_fork">MQTT Observer (agessaman)</option>
      </select>
    </label>

    <label>
      <span>Version</span>
      <select id="ref-select"><option value="main">main</option></select>
    </label>

    <label>
      <span>Board</span>
      <select id="board-select"></select>
    </label>

    <label>
      <span>Firmware type</span>
      <select id="type-select"></select>
    </label>

    <fieldset id="patch-section">
      <legend>Patches (PRs)</legend>
      <div id="suggested-prs"></div>
      <ol id="pr-list"></ol>
      <div class="pr-add-row">
        <input type="number" id="custom-pr-input" placeholder="PR number" min="1">
        <button type="button" id="add-pr-btn">+ Add</button>
      </div>
    </fieldset>

    <fieldset id="region-section" hidden>
      <legend>Regions</legend>
      <label id="regions-enable-label">
        <input type="checkbox" id="regions-enable"> Preconfigure default regions
      </label>
      <p id="regions-note">Applied on boot if no regions are configured on the device.</p>
      <div id="region-body" hidden>
        <table id="region-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Parent</th>
              <th>Flood</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="region-rows"></tbody>
        </table>
        <div id="region-actions">
          <button type="button" id="add-region-btn">+ Add region</button>
          <button type="button" id="reset-regions-btn" hidden>Reset</button>
        </div>
      </div>
    </fieldset>

    <div id="wifi-section" hidden>
      <label>
        <span>WiFi SSID</span>
        <input type="text" id="wifi-ssid" maxlength="32" placeholder="required for WiFi companion">
      </label>
      <label>
        <span>WiFi password</span>
        <input type="text" id="wifi-pwd" maxlength="63" placeholder="required for WiFi companion">
      </label>
    </div>

    <button type="button" id="build-btn">Build firmware</button>
    <button type="button" id="cancel-btn" hidden>Cancel build</button>
    <a id="download-link" hidden href="#">Download firmware</a>
    <div id="flash-row">
      <button type="button" id="dfu-btn" hidden>Enter DFU mode</button>
      <button type="button" id="flash-btn" hidden>Flash to device</button>
    </div>
    <div id="flash-section" hidden>
      <progress id="flash-bar" max="100" value="0"></progress>
      <p id="flash-status"></p>
      <pre id="flash-log" hidden></pre>
    </div>
  </div>

  <section id="log-section" hidden>
    <h2 style="margin-bottom:0.5rem">Build log</h2>
    <pre id="log-output"></pre>
  </section>
</main>
<script src="/app.js"></script>
<script type="module" src="/flash.js"></script>
</body>
</html>
