<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeshCore Firmware Builder</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<main>
  <div id="controls">
    <h1>MeshCore Firmware Builder</h1>

    <label>
      <span>Version</span>
      <select id="ref-select"><option value="main">main</option></select>
    </label>

    <label>
      <span>Board</span>
      <select id="board-select"></select>
    </label>

    <label>
      <span>Firmware type</span>
      <select id="type-select"></select>
    </label>

    <fieldset id="region-section" hidden>
      <legend>Regions</legend>
      <table id="region-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Parent</th>
            <th>Flood</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="region-rows"></tbody>
      </table>
      <div id="region-actions">
        <button type="button" id="add-region-btn">+ Add region</button>
        <button type="button" id="reset-regions-btn" hidden>Reset</button>
      </div>
    </fieldset>

    <label>
      <span>Device name</span>
      <input type="text" id="advert-name" placeholder="firmware default" maxlength="31">
    </label>

    <div id="wifi-section" hidden>
      <label>
        <span>WiFi SSID</span>
        <input type="text" id="wifi-ssid" maxlength="32" placeholder="required for WiFi companion">
      </label>
      <label>
        <span>WiFi password</span>
        <input type="text" id="wifi-pwd" maxlength="63" placeholder="required for WiFi companion">
      </label>
    </div>

    <div id="location-section" hidden>
      <label>
        <span>Admin password</span>
        <input type="text" id="admin-password" placeholder="firmware default" maxlength="15">
      </label>
      <div class="row-2">
        <label>
          <span>Latitude</span>
          <input type="number" id="lat" step="any" min="-90" max="90" placeholder="optional">
        </label>
        <label>
          <span>Longitude</span>
          <input type="number" id="lon" step="any" min="-180" max="180" placeholder="optional">
        </label>
      </div>
    </div>

    <button type="button" id="build-btn">Build firmware</button>
    <a id="download-link" hidden href="#">Download firmware</a>
  </div>

  <section id="log-section" hidden>
    <h2 style="margin-bottom:0.5rem">Build log</h2>
    <pre id="log-output"></pre>
  </section>
</main>
<script src="/app.js"></script>
</body>
</html>
